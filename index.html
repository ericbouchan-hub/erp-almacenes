async function ejecutarMovimiento(r){

   let q = +qty.value || 1;

   const {
      doc,
      updateDoc,
      addDoc,
      collection
   } = await import(
      "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js"
   );

   if(accionPendiente === "salida"){

      let p = products.find(
         x => x.id === selected
      );

      if(!p)
         return alert("Producto no encontrado");

      if(q > p.stock)
         return alert("Stock insuficiente");

      await updateDoc(
         doc(
            window.db,
            "products",
            p.firebaseId
         ),
         {
            stock: p.stock - q
         }
      );

      history.push({
         date: new Date().toISOString(),
         almacen: warehouse,
         type: "Salida",
         sku: p.sku,
         nombre: p.nombre,
         qty: q,
         responsable: r
      });

      await cargarProductosFirestore();

      alert("Salida registrada en Firestore");

      return;
   }

   if(accionPendiente === "transfer"){

      let destino =
         warehouse === "P5010"
         ? "TA"
         : "P5010";

      let origen = products.find(
         x => x.id === selected
      );

      if(!origen)
         return alert("Producto no encontrado");

      if(q > origen.stock)
         return alert("Stock insuficiente");

      let productoDestino = products.find(
         x =>
            x.idOrigen === origen.id &&
            x.ubicacion === destino
      );

      await updateDoc(
         doc(
            window.db,
            "products",
            origen.firebaseId
         ),
         {
            stock: origen.stock - q
         }
      );

      if(productoDestino){

         await updateDoc(
            doc(
               window.db,
               "products",
               productoDestino.firebaseId
            ),
            {
               stock: productoDestino.stock + q
            }
         );

      }else{

         await addDoc(
            collection(
               window.db,
               "products"
            ),
            {
               id: crypto.randomUUID(),
               idOrigen: origen.id,
               nombre: origen.nombre,
               sku: "TRANSF-" + origen.sku,
               stock: q,
               unidad: origen.unidad,
               pedido: origen.pedido || "",
               ubicacion: destino
            }
         );

      }

      history.push({
         date: new Date().toISOString(),
         almacen: warehouse,
         destino: destino,
         type: "Transferencia",
         sku: origen.sku,
         nombre: origen.nombre,
         qty: q,
         responsable: r
      });

      await cargarProductosFirestore();

      alert("Transferencia registrada en Firestore");

   }

}
async function hacerEntrada(){

  if(!selected)
    return alert("Selecciona un producto");

  let q = +qty.value || 0;

  if(q <= 0)
    return alert("Cantidad inválida");

  let p = products.find(
    x =>
      x.id === selected &&
      x.ubicacion === warehouse
  );

  if(!p)
    return alert("Producto no encontrado");

  let pedido = prompt("Número de pedido:") || "";

  const {
     doc,
     updateDoc
  } = await import(
     "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js"
  );

  await updateDoc(
     doc(
        window.db,
        "products",
        p.firebaseId
     ),
     {
        stock: p.stock + q
     }
  );

  history.push({
     date: new Date().toISOString(),
     almacen: warehouse,
     type: "Entrada",
     sku: p.sku,
     nombre: p.nombre,
     qty: q,
     pedido: pedido,
     responsable: "Sistema"
  });

  qty.value = "";

  await cargarProductosFirestore();

  alert("Entrada registrada en Firestore");

}

function exportarRespaldoExcel(){
  let wb = XLSX.utils.book_new();
  let wsProductos = XLSX.utils.json_to_sheet(products);
  let wsMovimientos = XLSX.utils.json_to_sheet(history);
  XLSX.utils.book_append_sheet(
    wb,
    wsProductos,
    "Productos"
  );

  XLSX.utils.book_append_sheet(
    wb,
    wsMovimientos,
    "Movimientos"
  );

  let fecha = new Date()
    .toISOString()
    .slice(0,19)
    .replace(/:/g,"-");

  XLSX.writeFile(
    wb,
    "Respaldo_ERP_" + fecha + ".xlsx"
  );
}
/* ✅ EXPORTAR PDF */
function exportPDF(){

  const { jsPDF } = window.jspdf;

  let doc = new jsPDF();

  let titulo = warehouse === "P5010"
  ? "REPORTE ALMACEN 5010"
  : "REPORTE ALMACEN TORRE AREA";

  doc.setFontSize(16);
  doc.text(titulo, 14, 15);

  let rows = [...document.querySelectorAll("#tablaReporte tr")]
    .map(tr => [...tr.children].map(td => td.innerText));

  doc.autoTable({
    body: rows,
    startY: 25
  });

  doc.save(
    warehouse === "P5010"
      ? "Reporte_5010.pdf"
      : "Reporte_Torre_Area.pdf"
  );
}

async function guardarProducto(){

  let nombre = document.getElementById("np_nombre").value;
  let sku = document.getElementById("np_sku").value;
  let stock = +document.getElementById("np_stock").value || 0;
  let unidad = document.getElementById("np_unidad").value || "Pza";
  let pedido = document.getElementById("np_pedido").value || "";

  if(!nombre || !sku){
    return alert("Nombre y SKU obligatorios");
  }

  const {
     addDoc,
     collection
  } = await import(
     "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js"
  );

  await addDoc(
     collection(window.db,"products"),
     {
        id: crypto.randomUUID(),
        nombre: nombre,
        sku: sku,
        stock: stock,
        unidad: unidad,
        pedido: pedido,
        ubicacion: warehouse
     }
  );

  await cargarProductosFirestore();

  cerrarNuevoProducto();

  alert("Producto guardado en Firestore");

}

    p => p.ubicacion === warehouse
  );

  let rows = inventario.map(p => [
    p.nombre,
    p.sku,
    p.stock,
    p.unidad
  ]);

  doc.autoTable({
    head:[["Nombre","SKU","Stock","Unidad"]],
    body:rows,
    startY:25
  });

  doc.save(
    warehouse === "P5010"
      ? "Inventario_5010.pdf"
      : "Inventario_Torre_Area.pdf"
  );
}
function iniciarSesion(){

   let u =
      document.getElementById("loginUser")
      .value
      .trim();

   let p =
      document.getElementById("loginPass")
      .value;

   if(
      !usuarios[u] ||
      usuarios[u].password !== p
   ){
      alert("Usuario o contraseña incorrectos");
      return;
   }

   usuarioActual = u;

   if(
      usuarios[u].almacenes.length === 1
   ){

      warehouse =
         usuarios[u].almacenes[0];

      if(warehouse === "P5010"){
         cambiarVista("5010");
      }else{
         cambiarVista("T");
      }

   }

   if(
      !usuarios[u].almacenes.includes("P5010")
   ){
      document.getElementById("tab5010").style.display="none";
   }

   if(
      !usuarios[u].almacenes.includes("TA")
   ){
      document.getElementById("tabTA").style.display="none";
   }

   document.getElementById("loginModal").style.display="none";
}
cargarProductosFirestore();
</script>
