async function guardarMovimientoFirestore(datos){

async function cargarMovimientosFirestore(){

   const {
      collection,
      onSnapshot
   } = await import(
      "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js"
   );

   onSnapshot(

      collection(
         window.db,
         "movimientos"
      ),

      (snap)=>{

         history = [];

         snap.forEach(docu=>{

            history.push({
               firebaseId: docu.id,
               ...docu.data()
            });

         });

         console.log(
            "MOVIMIENTOS ACTUALIZADOS:",
            history.length
         );

      }

   );

 async function eliminarProducto(e,id){

   e.preventDefault();

   if(usuarioActual !== "admin"){
      alert(
         "Solo el administrador puede eliminar productos"
      );
      return;
   }

   let p = products.find(x => x.id === id);

   if(!p){
      return;
   }

   let confirmacion = prompt(
   "Está a punto de eliminar completamente este producto:\n\n" +
   p.nombre +
   "\nSKU: " + p.sku +
   "\nStock: " + p.stock +
   "\n\nPara confirmar escriba exactamente:\nELIMINAR"
);

if(
   confirmacion === null ||
   confirmacion.trim().toUpperCase() !== "ELIMINAR"
){
   alert("Eliminación cancelada");
   return;
}

   const {
      doc,
      deleteDoc
   } = await import(
      "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js"
   );

   let movimiento = {
      date: new Date().toISOString(),
      almacen: p.ubicacion,
      type: "Eliminación",
      sku: p.sku,
      nombre: p.nombre,
      qty: p.stock,
      pedido: "PRODUCTO ELIMINADO",
      responsable: usuarioActual
   };

   await guardarMovimientoFirestore(
      movimiento
   );

   await deleteDoc(
      doc(
         window.db,
         "products",
         p.firebaseId
      )
   );

   alert("Producto eliminado");
}

/* IMPORTAR */
excelInput.onchange = async e => {
   if(usuarioActual !== "admin"){
   alert(
      "Solo el administrador puede importar inventario"
   );
   
return;
   }

  let r = new FileReader();

  r.onload = async ev => {

    let wb = XLSX.read(
      new Uint8Array(ev.target.result),
      { type: "array" }
    );

    let rows = XLSX.utils.sheet_to_json(
      wb.Sheets[wb.SheetNames[0]]
    );

    console.log("Registros:", rows.length);

    const {
      addDoc,
      collection
    } = await import(
      "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js"
    );

    let contador = 0;

    for (const x of rows) {

   if (!x.NOMBRE || !x.SKU) {
      continue;
   }

   let skuExcel =
      String(x.SKU).trim().toUpperCase();

   let nombreExcel =
      String(x.NOMBRE).trim().toUpperCase();

   let ubicacionExcel =
   String(
      x["UBICACIÓN"] ||
      x["UBICACION"] ||
      ""
   )
   .trim()
   .toUpperCase();

let existe = products.find(p =>

   (p.sku || "")
   .trim()
   .toUpperCase() === skuExcel

   &&

   (p.nombre || "")
   .trim()
   .toUpperCase() === nombreExcel

   &&

   (p.ubicacion || "")
   .trim()
   .toUpperCase() === ubicacionExcel

);

   if(existe){

      console.log(
         "Duplicado omitido:",
         skuExcel,
         nombreExcel
      );

      continue;
   }

   await addDoc(
   collection(
      window.db,
      "products"
   ),
   {
      id: crypto.randomUUID(),
      nombre: String(x.NOMBRE).trim(),
      sku: skuExcel,
      stock: Number(x.STOCK) || 0,
      ubicacion: String(
         x["UBICACIÓN"] || x["UBICACION"] || ""
      ).trim(),
      unidad: String(
         x.UNIDAD || "PZA"
      ).trim(),
      especialidad: String(
         x.ESPECIALIDAD || "SIN ESPECIALIDAD"
      ).trim()
   }
);

contador++;

}


      alert(
         contador +
         " productos cargados en Firestore"
      );

   };


r.readAsArrayBuffer(
   e.target.files[0]
);

};

function onScanSuccess(decodedText){

   if(decodedText.trim() !== responsablePendiente.trim()){

      alert(
         "QR Incorrecto\n\n" +
         "Esperado: " + responsablePendiente +
         "\nLeído: " + decodedText
      );

      return;
   }

   html5QrCode.stop();

   modalQR.style.display="none";

   ejecutarMovimiento(responsablePendiente);
}

      );

      if(!p)
         return alert("Producto no encontrado");

      if(q > p.stock)
         return alert("Stock insuficiente");

      await updateDoc(
         doc(
            window.db,
            "products",
            p.firebaseId
         ),
         {
            stock: p.stock - q
         }
      );

      let movimiento = {
   date: new Date().toISOString(),
   almacen: warehouse,
   type: "Salida",
   sku: p.sku,
   nombre: p.nombre,
   qty: q,
   pedido: "",
   responsable: r
};

history.push(movimiento);

await guardarMovimientoFirestore(
   movimiento
);

      await cargarProductosFirestore();

      alert("Salida registrada en Firestore");

      return;
   }

   if(accionPendiente === "transfer"){

   let destino =
      document.getElementById(
         "selectDestino"
      ).value;

   if(destino === warehouse){

      return alert(
         "Seleccione un almacén destino diferente"
      );

   }

   let origen = products.find(
      x => x.id === selected
   );

   if(!origen)
      return alert("Producto no encontrado");

   if(q > origen.stock)
      return alert("Stock insuficiente");

   let productoDestino = products.find(
      x =>
         x.idOrigen === origen.id &&
         x.ubicacion === destino
   );

   await updateDoc(
      doc(
         window.db,
         "products",
         origen.firebaseId
      ),
      {
         stock: origen.stock - q
      }
   );

   if(productoDestino){

      await updateDoc(
         doc(
            window.db,
            "products",
            productoDestino.firebaseId
         ),
         {
            stock: productoDestino.stock + q
         }
      );

   }else{

      await addDoc(
   collection(
      window.db,
      "products"
   ),
   {
      id: crypto.randomUUID(),
      idOrigen: origen.id,
      nombre: origen.nombre,
      sku: "TRANSF-" + origen.sku,
      stock: q,
      unidad: origen.unidad,
      pedido: origen.pedido || "",
      especialidad: origen.especialidad || "SIN ESPECIALIDAD",
      ubicacion: destino
   }
);

   }

   let movimiento = {
   date: new Date().toISOString(),
   almacen: warehouse,
   destino: destino,
   type: "Transferencia",
   sku: origen.sku,
   nombre: origen.nombre,
   qty: q,
   pedido:
   (warehouse === "P5010" ? "5010" : "TORRE AREA")
   + " -> " +
   (destino === "P5010" ? "5010" : "TORRE AREA"),
   responsable: r
};

   history.push(movimiento);

   await guardarMovimientoFirestore(
      movimiento
   );

   await cargarProductosFirestore();

alert(
   "Transferencia registrada en Firestore"
);

   }

}

async function hacerEntrada(){

  if(!selected)
    return alert("Selecciona un producto");

  let q = +qty.value || 0;

  if(q <= 0)
    return alert("Cantidad inválida");

  let p = products.find(
    x =>
      x.id === selected &&
      x.ubicacion === warehouse
  );

  if(!p)
    return alert("Producto no encontrado");

  let pedido = prompt("Número de pedido:") || "";

  const {
     doc,
     updateDoc
  } = await import(
     "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js"
  );

  await updateDoc(
     doc(
        window.db,
        "products",
        p.firebaseId
     ),
     {
        stock: p.stock + q
     }
  );

  let movimiento = {
   date: new Date().toISOString(),
   almacen: warehouse,
   type: "Entrada",
   sku: p.sku,
   nombre: p.nombre,
   qty: q,
   pedido: pedido,
   responsable: "Sistema"
};

history.push(movimiento);

await guardarMovimientoFirestore(
   movimiento
);

await cargarProductosFirestore();

alert("Transferencia registrada en Firestore");

   }

function exportarRespaldoExcel(){
  let wb = XLSX.utils.book_new();
  let wsProductos = XLSX.utils.json_to_sheet(products);
  let wsMovimientos = XLSX.utils.json_to_sheet(history);
  XLSX.utils.book_append_sheet(
    wb,
    wsProductos,
    "Productos"
  );

  XLSX.utils.book_append_sheet(
    wb,
    wsMovimientos,
    "Movimientos"
  );

  let fecha = new Date()
    .toISOString()
    .slice(0,19)
    .replace(/:/g,"-");

  XLSX.writeFile(
    wb,
    "Respaldo_ERP_" + fecha + ".xlsx"
  );
}
/* ✅ EXPORTAR PDF */
function exportPDF(){

  const { jsPDF } = window.jspdf;

  let doc = new jsPDF();

  let titulo = warehouse === "P5010"
  ? "REPORTE ALMACEN 5010"
  : "REPORTE ALMACEN TORRE AREA";

  doc.setFontSize(16);
  doc.text(titulo, 14, 15);

  let rows = [...document.querySelectorAll("#tablaReporte tr")]
    .map(tr => [...tr.children].map(td => td.innerText));

  doc.autoTable({
    body: rows,
    startY: 25
  });

  doc.save(
    warehouse === "P5010"
      ? "Reporte_5010.pdf"
      : "Reporte_Torre_Area.pdf"
  );
}

function buscarSimilares(){

   let texto =
      document.getElementById("np_nombre")
      .value
      .trim()
      .toUpperCase();

   let div =
      document.getElementById(
         "sugerenciasProducto"
      );

   if(texto.length < 3){
      div.style.display = "none";
      div.innerHTML = "";
      return;
   }

   let similares = products.filter(p =>
      (p.nombre || "")
      .toUpperCase()
      .includes(texto)
   );

   if(similares.length === 0){
      div.style.display = "none";
      div.innerHTML = "";
      return;
   }

   div.style.display = "block";

   div.innerHTML = similares
      .slice(0,10)
      .map(p => `
         <div
            style="
               padding:6px;
               border-bottom:1px solid #eee;
               cursor:pointer;
            "
            onclick="
               document.getElementById('np_nombre').value='${p.nombre}';
               document.getElementById('np_sku').value='${p.sku}';
               document.getElementById('sugerenciasProducto').style.display='none';
            ">
            <b>${p.nombre}</b><br>
            SKU: ${p.sku}
         </div>
      `)
      .join("");
}
async function guardarProducto(){

  let nombre = document.getElementById("np_nombre").value;
  let sku = document.getElementById("np_sku").value;
  let stock = +document.getElementById("np_stock").value || 0;
  let unidad = document.getElementById("np_unidad").value || "Pza";
  let pedido = document.getElementById("np_pedido").value || "";

  if(!nombre || !sku){
    return alert("Nombre y SKU obligatorios");
  }
  let duplicado = products.find(p =>

   (p.sku || "")
   .trim()
   .toUpperCase() ===
   sku.trim().toUpperCase()

   ||

   (p.nombre || "")
   .trim()
   .toUpperCase() ===
   nombre.trim().toUpperCase()

);

if(duplicado){

   alert(
      "Producto existente:\n\n" +
      duplicado.nombre +
      "\nSKU: " +
      duplicado.sku
   );

   return;
}

  const {
     addDoc,
     collection
  } = await import(
     "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js"
  );

  await addDoc(
   collection
   (window.db,"products"),
   {
      id: crypto.randomUUID(),
      nombre: nombre,
      sku: sku,
      stock: stock,
      unidad: unidad,
      pedido: pedido,
      especialidad: "SIN ESPECIALIDAD",
      ubicacion: warehouse
   }
);

  await cargarProductosFirestore();

  cerrarNuevoProducto();

  alert("Producto guardado en Firestore");

}
